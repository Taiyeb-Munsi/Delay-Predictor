<!DOCTYPE html>
<html>
<head>
    <title>Delay Predictor</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div id="map"></div>

    <div class="card">
        <h2>Delay Predictor</h2>
        
        <input type="text" id="initalDestination" placeholder="From">
        <input type="text" id="finalDestination" placeholder="To"> 
        <button onclick="getPrediction()">Predict Delay</button>

        <div id="result">
            <hr>
            <h3 id="resRoute"></h3>
            <p><strong>Chance:</strong> <span id="resChance"></span>%</p>
            <p><strong>Base Delay:</strong> <span id="resDelay"></span> mins</p>
            <p><strong>Chain Impact:</strong> <span id="resChain"></span> mins</p>
            <div id="resStatus"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
